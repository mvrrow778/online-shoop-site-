<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="mb-4">Новый товар на склад</h2>
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Название</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Категория</label>
                                <select name="category" class="form-select">
                                    {% for cat in categories %}
                                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Цена (тг)</label>
                                    <input type="number" name="price" class="form-control" step="0.01" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Количество</label>
                                    <input type="number" name="quantity" class="form-control" required>
                                </div>
				<div class="mb-3">
    				    <label class="form-label">Описание товара</label>
    				    <textarea name="description" class="form-control" rows="3" placeholder="Описание"></textarea>
				</div>
				<div class="mb-3">
        			    <label class="form-label">Изображение товара</label>
        			        <input type="file" name="image" class="form-control" accept="image/*">
    				</div>

                            </div>
                            <button type="submit" class="btn btn-success w-100">Добавить в базу</button>
                            <a href="/" class="btn btn-link w-100 mt-2">Отмена</a>

			    	
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
