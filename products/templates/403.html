<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Доступ запрещён</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card shadow-sm text-center" style="width: 480px;">
            <div class="card-body p-4">
                <h1 class="display-4 text-danger">403</h1>
                <h4 class="mb-3">Доступ запрещён</h4>
                <p class="text-muted">{{ message|default:"У вас нет прав для выполнения этого действия." }}</p>
                <a href="/" class="btn btn-primary mt-2">На главную</a>
            </div>
        </div>
    </div>
</body>
</html>
